<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
<script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>

<script>
const REPO_OWNER = 'jammy0903';
const REPO_NAME  = 'jammy0903.github.io';
const BRANCH     = 'main';
const STORAGE_KEY = 'blog_auth_v1';

let easyMDE = null;

/* ── SHA-256 해싱 (Web Crypto API) ── */
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ── 간단한 XOR 난독화 (토큰을 그대로 저장하지 않기 위해) ── */
function xorEncode(str, key) {
  return btoa(str.split('').map((c, i) =>
    String.fromCharCode(c.charCodeAt(0) ^ key.charCodeAt(i % key.length))
  ).join(''));
}
function xorDecode(encoded, key) {
  const str = atob(encoded);
  return str.split('').map((c, i) =>
    String.fromCharCode(c.charCodeAt(0) ^ key.charCodeAt(i % key.length))
  ).join('');
}

/* ── 저장된 인증 정보 불러오기 ── */
function loadAuth() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function saveAuth(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* ── 화면 초기화: setup-screen이 기본 표시 → 이미 설정됐으면 login으로 전환 ── */
document.addEventListener('DOMContentLoaded', () => {
  const auth = loadAuth();
  if (auth) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'block';
  }
  // auth 없으면 setup-screen이 이미 보임 (display:block 기본값)
});

function showSetup() {
  document.getElementById('setup-screen').style.display  = 'block';
  document.getElementById('login-screen').style.display  = 'none';
  document.getElementById('write-screen').style.display  = 'none';
}

/* ── 초기 설정 ── */
async function doSetup() {
  const token = document.getElementById('setup-token').value.trim();
  const username = document.getElementById('setup-username').value.trim();
  const pw  = document.getElementById('setup-password').value;
  const pw2 = document.getElementById('setup-password2').value;
  const errEl = document.getElementById('setup-error');

  if (!token)    { errEl.textContent = '토큰을 입력해주세요.'; return; }
  if (!username) { errEl.textContent = '아이디를 입력해주세요.'; return; }
  if (!pw)       { errEl.textContent = '비밀번호를 입력해주세요.'; return; }
  if (pw !== pw2){ errEl.textContent = '비밀번호가 일치하지 않습니다.'; return; }

  errEl.textContent = '설정 중...';

  const pwHash = await sha256(pw + username);
  const encodedToken = xorEncode(token, pwHash.substring(0, 16));

  saveAuth({ username, pwHash, encodedToken });
  errEl.textContent = '';
  showWriteScreen(username, token);
}

/* ── 로그인 ── */
async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');

  const auth = loadAuth();
  if (!auth) { showSetup(); return; }

  const pwHash = await sha256(pw + username);
  if (username !== auth.username || pwHash !== auth.pwHash) {
    errEl.textContent = '아이디 또는 비밀번호가 틀렸습니다.';
    return;
  }

  errEl.textContent = '';
  const token = xorDecode(auth.encodedToken, pwHash.substring(0, 16));
  showWriteScreen(username, token);
}

/* ── Enter 키 로그인 ── */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-screen').style.display !== 'none') doLogin();
    if (document.getElementById('setup-screen').style.display !== 'none') doSetup();
  }
});

/* ── 에디터 화면 표시 ── */
function showWriteScreen(username, token) {
  window._ghToken = token;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('write-screen').style.display = 'block';
  document.getElementById('logged-user').textContent = username;

  /* 날짜 기본값 */
  document.getElementById('post-date').value = new Date().toISOString().split('T')[0];
  updateSlugPreview();

  /* EasyMDE 초기화 (최초 1회) */
  if (!easyMDE) {
    easyMDE = new EasyMDE({
      element: document.getElementById('post-content'),
      placeholder: '여기에 마크다운으로 내용을 작성하세요...\n\n## 소제목\n\n본문 내용\n\n```python\nprint("Hello!")\n```',
      spellChecker: false,
      autosave: { enabled: true, uniqueId: 'jammy-blog-autosave', delay: 3000 },
      toolbar: [
        'bold','italic','strikethrough','heading','|',
        'quote','code','unordered-list','ordered-list','|',
        'link','image','table','horizontal-rule','|',
        'preview','side-by-side','fullscreen','|','guide'
      ],
    });
  }
}

/* ── 로그아웃 ── */
function doLogout() {
  window._ghToken = null;
  document.getElementById('write-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('login-password').value = '';
}

/* ── 파일명 슬러그 ── */
function slugify(text) {
  return text.trim()
    .replace(/[\s·]+/g, '-')
    .replace(/[<>:"\/\\|?*\x00-\x1f]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '')
    .substring(0, 80);
}

function updateSlugPreview() {
  const title = document.getElementById('post-title') ? document.getElementById('post-title').value : '';
  const date  = document.getElementById('post-date')  ? document.getElementById('post-date').value  : '';
  const el    = document.getElementById('slug-preview');
  if (!el || !title.trim()) { if(el) el.textContent = ''; return; }
  el.textContent = '파일명: _posts/' + date + '-' + slugify(title) + '.md';
}

/* ── Front Matter ── */
function buildFrontMatter() {
  const title      = document.getElementById('post-title').value.trim();
  const subtitle   = document.getElementById('post-subtitle').value.trim();
  const date       = document.getElementById('post-date').value;
  const categories = document.getElementById('post-categories').value.trim() || 'blog';
  const tagsRaw    = document.getElementById('post-tags').value.trim();
  const tags       = tagsRaw ? tagsRaw.split(',').map(function(t){ return t.trim(); }).filter(Boolean) : [];

  var fm = '---\n';
  fm += 'layout: post\n';
  fm += 'title: "' + title.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"\n';
  if (subtitle) fm += 'subtitle: "' + subtitle.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"\n';
  fm += 'date: ' + date + ' 12:00:00 +0900\n';
  fm += 'categories: ' + categories + '\n';
  if (tags.length > 0) fm += 'tags: [' + tags.map(function(t){ return "'" + t + "'"; }).join(', ') + ']\n';
  fm += '---\n\n';
  return fm;
}

/* ── 발행 ── */
async function submitPost() {
  const token = window._ghToken;
  if (!token) { showStatus('danger', '로그인이 필요합니다.'); return; }

  const title = document.getElementById('post-title').value.trim();
  if (!title) { showStatus('danger', '제목을 입력해주세요.'); return; }

  const content = easyMDE.value().trim();
  if (!content) { showStatus('danger', '내용을 입력해주세요.'); return; }

  const date     = document.getElementById('post-date').value;
  const filename = '_posts/' + date + '-' + slugify(title) + '.md';
  const fullText = buildFrontMatter() + content;
  const encoded  = btoa(unescape(encodeURIComponent(fullText)));

  showStatus('info', '⏳ 발행 중...');

  try {
    const res = await fetch(
      'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + encodeURIComponent(filename),
      {
        method: 'PUT',
        headers: {
          'Authorization': 'token ' + token,
          'Content-Type': 'application/json',
          'Accept': 'application/vnd.github+json',
        },
        body: JSON.stringify({ message: 'Add post: ' + title, content: encoded, branch: BRANCH }),
      }
    );
    const data = await res.json();
    if (res.ok) {
      showStatus('success',
        '✅ 발행 완료! <a href="' + data.content.html_url + '" target="_blank">GitHub에서 보기 →</a><br>' +
        '<small>1~2분 후 블로그에 반영됩니다.</small>'
      );
    } else if (res.status === 422) {
      showStatus('danger', '❌ 같은 파일명이 이미 존재합니다. 제목을 조금 바꿔보세요.<br><code>' + filename + '</code>');
    } else if (res.status === 401) {
      showStatus('danger', '❌ 인증 실패 — 토큰이 만료됐을 수 있습니다. 로그아웃 후 초기 설정을 다시 해주세요.');
    } else {
      showStatus('danger', '❌ 오류 (' + res.status + '): ' + data.message);
    }
  } catch(e) {
    showStatus('danger', '❌ 네트워크 오류: ' + e.message);
  }
}

function showStatus(type, message) {
  var el = document.getElementById('status-message');
  el.className = 'alert alert-' + type;
  el.innerHTML = message;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>

###########################################################
### Beautiful Jekyll - jammy0903 블로그
###########################################################

############################
# --- Required options --- #
############################

title: "알게되어 뿌듯한 걸 적는 블로그"
author: jammy0903
url: "https://jammy0903.github.io"
baseurl: ""

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  Home: "https://jammy0903.github.io/"
  Posts: "posts"
  About: "aboutme"

################
# --- Logo --- #
################

avatar: "https://velog.velcdn.com/images/jammy0903/profile/cfd44162-5e63-4807-9416-a2260d9e7011/social_profile.png"
round-avatar: true

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  github: jammy0903
  rss: true

rss-description: "알게되어 뿌듯한 걸 적는 블로그"

###########################
# --- General options --- #
###########################

share-links-active:
  twitter: true
  facebook: false
  linkedin: true
  vk: false
  reddit: false

url-pretty: "jammy0903.github.io"
title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: false

######################################
# --- Colours / background image --- #
######################################

page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
navbar-col: "#F5F5F5"
navbar-text-col: "#404040"
navbar-border-col: "#DDDDDD"
footer-col: "#F5F5F5"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

################
# --- Misc --- #
################

date_format: "%Y-%m-%d"

site-css:
  - "/assets/css/custom-styles.css"

#################################################################################
# --- You don't need to touch anything below here (but you can if you want) --- #
#################################################################################

timezone: "Asia/Seoul"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - migrate_velog.py

plugins:
  - jekyll-paginate
  - jekyll-sitemap

remote_theme: daattali/beautiful-jekyll
